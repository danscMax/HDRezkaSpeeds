<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <!-- Rounded-square base with HDRezka cyan gradient. Same silhouette as
       the sister VideoSpeeds icon so users recognise the family, but
       recoloured to HDRezka's signature blue (#00a1db). -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00b8f0"/>
      <stop offset="55%" stop-color="#00a1db"/>
      <stop offset="100%" stop-color="#0080b0"/>
    </linearGradient>
    <linearGradient id="play" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#e6f7ff"/>
    </linearGradient>
    <filter id="softShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2.2"/>
      <feOffset dx="0" dy="2" result="offset"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.35"/></feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Rounded-square background. iOS-style ~22% radius for a modern
       app-icon feel, matches the visual weight of VideoSpeeds. -->
  <rect x="4" y="4" width="120" height="120" rx="28" ry="28" fill="url(#bg)"/>

  <!-- Subtle inner highlight for depth (top edge catches a touch of light). -->
  <rect x="4" y="4" width="120" height="60" rx="28" ry="28"
        fill="white" opacity="0.08"/>

  <!-- Speed arc — three motion sweeps trailing the play button. Mirrors
       the VideoSpeeds visual idiom so the two extensions feel like a
       set, but tinted slightly translucent so it reads as "motion"
       not as a primary shape. -->
  <g stroke="white" stroke-linecap="round" fill="none" filter="url(#softShadow)">
    <path d="M 88 38 A 36 36 0 0 1 88 90" stroke-width="6" opacity="0.85"/>
    <path d="M 100 44 A 30 30 0 0 1 100 84" stroke-width="5" opacity="0.55"/>
    <path d="M 110 50 A 24 24 0 0 1 110 78" stroke-width="4" opacity="0.30"/>
  </g>

  <!-- Play triangle. Slightly inset from the geometric centre so the
       optical centre lands in the middle (the triangle's mass sits
       to the left of its bounding box). -->
  <path d="M 44 36 L 44 92 L 90 64 Z"
        fill="url(#play)" filter="url(#softShadow)"/>
</svg>
