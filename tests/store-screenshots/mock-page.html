<!DOCTYPE html>
<html lang="ru" data-vs-theme="dark">
<head>
<meta charset="UTF-8">
<title>HDRezka — store screenshot host</title>
<style>
  /* Host-page styles ONLY. The extension's content script injects its
     OWN .vs-panel + .settings-menu + their CSS at runtime — render.mjs
     intercepts requests for this mock and serves it under the
     rezka.ag/films/* path so the content_script bootstrap fires. */
  html, body {
    margin: 0;
    padding: 0;
    background: rgb(2, 5, 14);
    color: rgba(255, 255, 255, 0.92);
    font-family: 'Roboto', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    min-height: 100vh;
  }
  .b-tophead {
    height: 56px;
    background: linear-gradient(180deg, rgba(0, 0, 0, 0.6), transparent);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 32px;
    border-bottom: 1px solid rgba(255, 255, 255, 0.05);
  }
  .b-tophead-logo { font-weight: 800; font-size: 22px; letter-spacing: 1px; }
  .b-tophead-logo .hd { color: #00a1db; }
  .b-tophead-nav {
    display: flex; gap: 24px; font-size: 13px;
    color: rgba(255, 255, 255, 0.65);
  }
  .b-tophead-nav span { cursor: pointer; }

  .b-content__main {
    max-width: 1080px;
    margin: 0 auto;
    padding: 24px 16px;
  }

  /* Player area — dark glow, plyr-skin look. The real <video> is invisible
     by default (no src), but its presence is what DiscoveryEngine looks
     for; without it the panel anchors would never resolve. */
  .b-player {
    position: relative;
    width: 100%;
    aspect-ratio: 16 / 9;
    background:
      radial-gradient(ellipse at 30% 40%, rgba(0, 161, 219, 0.18), transparent 50%),
      radial-gradient(ellipse at 80% 70%, rgba(120, 0, 200, 0.14), transparent 55%),
      linear-gradient(160deg, #0a0f1f 0%, #060912 100%);
    border-radius: 8px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    box-shadow: 0 6px 30px rgba(0, 0, 0, 0.6);
  }
  .b-player video {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: contain;
    background: transparent;
    pointer-events: none;
  }
  .player-play-btn {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 84px;
    height: 84px;
    background: rgba(0, 161, 219, 0.85);
    border-radius: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 6px 24px rgba(0, 161, 219, 0.4);
    z-index: 1;
  }
  .player-play-btn::after {
    content: '';
    width: 0;
    height: 0;
    border-left: 22px solid #fff;
    border-top: 14px solid transparent;
    border-bottom: 14px solid transparent;
    margin-left: 5px;
  }
  .plyr__controls {
    position: relative;
    background: linear-gradient(180deg, transparent, rgba(0, 0, 0, 0.7));
    padding: 12px 16px 10px;
    display: flex;
    align-items: center;
    gap: 12px;
    color: rgba(255, 255, 255, 0.85);
    font-size: 12px;
    z-index: 1;
  }
  .plyr__progress {
    flex: 1;
    height: 4px;
    background: rgba(255, 255, 255, 0.15);
    border-radius: 2px;
    overflow: hidden;
  }
  .plyr__progress::after {
    content: '';
    display: block;
    width: 35%;
    height: 100%;
    background: #00a1db;
  }
  .plyr__icon {
    width: 16px;
    height: 16px;
    background: rgba(255, 255, 255, 0.85);
    border-radius: 2px;
  }

  /* Series-stub block. DiscoveryEngine's `infoElem` strategy looks for
     this class to anchor the panel below the player. */
  .b-content__inline_items {
    margin-top: 16px;
    padding: 12px 16px;
    background: rgba(255, 255, 255, 0.03);
    border-radius: 6px;
    color: rgba(255, 255, 255, 0.6);
    font-size: 13px;
  }
</style>
</head>
<body>
<div class="b-tophead">
  <div class="b-tophead-logo"><span class="hd">HD</span>REZKA</div>
  <div class="b-tophead-nav">
    <span>Фильмы</span><span>Сериалы</span><span>Мультфильмы</span><span>Аниме</span>
  </div>
</div>

<div class="b-content__main">
  <div class="b-player">
    <video preload="none" muted></video>
    <div class="player-play-btn"></div>
    <div class="plyr__controls">
      <div class="plyr__icon"></div>
      <div class="plyr__progress"></div>
      <span style="font-variant-numeric:tabular-nums">00:42:18 / 01:44:48</span>
    </div>
  </div>
  <div class="b-content__inline_items">Эпизоды доступны здесь</div>
</div>
</body>
</html>
