<!DOCTYPE html>
<html lang="ru" data-vs-theme="dark">
<head>
<meta charset="UTF-8">
<title>HDRezka mock — store screenshot</title>
<style>
  /* HDRezka body / wrappers — colours mirrored from the live site so the
     screenshot reads as authentic. */
  html, body {
    margin: 0;
    padding: 0;
    background: rgb(2, 5, 14);
    color: rgba(255, 255, 255, 0.92);
    font-family: 'Roboto', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    min-height: 100vh;
  }
  .b-tophead {
    height: 56px;
    background: linear-gradient(180deg, rgba(0, 0, 0, 0.6), transparent);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 32px;
    border-bottom: 1px solid rgba(255, 255, 255, 0.05);
  }
  .b-tophead-logo {
    font-weight: 800;
    font-size: 22px;
    letter-spacing: 1px;
  }
  .b-tophead-logo .hd { color: #00a1db; }
  .b-tophead-nav {
    display: flex;
    gap: 24px;
    font-size: 13px;
    color: rgba(255, 255, 255, 0.65);
  }
  .b-tophead-nav span { cursor: pointer; }

  .b-content__main {
    max-width: 1080px;
    margin: 0 auto;
    padding: 24px 16px;
  }

  /* Player mock — keeps the dark-glow-on-black look of HDRezka's Plyr
     skin so the panel reads in context without us having to ship a
     real video frame. */
  .b-player {
    position: relative;
    width: 100%;
    aspect-ratio: 16 / 9;
    background:
      radial-gradient(ellipse at 30% 40%, rgba(0, 161, 219, 0.18), transparent 50%),
      radial-gradient(ellipse at 80% 70%, rgba(120, 0, 200, 0.14), transparent 55%),
      linear-gradient(160deg, #0a0f1f 0%, #060912 100%);
    border-radius: 8px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    box-shadow: 0 6px 30px rgba(0, 0, 0, 0.6);
  }
  .player-play-btn {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 84px;
    height: 84px;
    background: rgba(0, 161, 219, 0.85);
    border-radius: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 6px 24px rgba(0, 161, 219, 0.4);
  }
  .player-play-btn::after {
    content: '';
    width: 0;
    height: 0;
    border-left: 22px solid #fff;
    border-top: 14px solid transparent;
    border-bottom: 14px solid transparent;
    margin-left: 5px;
  }
  .plyr__controls {
    background: linear-gradient(180deg, transparent, rgba(0, 0, 0, 0.7));
    padding: 12px 16px 10px;
    display: flex;
    align-items: center;
    gap: 12px;
    color: rgba(255, 255, 255, 0.85);
    font-size: 12px;
  }
  .plyr__progress {
    flex: 1;
    height: 4px;
    background: rgba(255, 255, 255, 0.15);
    border-radius: 2px;
    overflow: hidden;
  }
  .plyr__progress::after {
    content: '';
    display: block;
    width: 35%;
    height: 100%;
    background: #00a1db;
  }
  .plyr__icon {
    width: 16px;
    height: 16px;
    background: rgba(255, 255, 255, 0.85);
    border-radius: 2px;
  }

  /* ─── BEGIN: copied verbatim from src/ui/styles.ts so the panel renders
     identically to what the user installs. Keep in sync if styles change. */

  :root,
  html[data-vs-theme="dark"] {
    --vs-bg-button: rgba(255, 255, 255, 0.15);
    --vs-bg-button-hover: rgba(255, 255, 255, 0.28);
    --vs-button-text: rgba(255, 255, 255, 0.95);
    --vs-bg-track: rgba(255, 255, 255, 0.22);
    --vs-text-primary: rgba(255, 255, 255, 0.95);
    --vs-text-secondary: rgba(255, 255, 255, 0.65);
    --vs-text-dim: rgba(255, 255, 255, 0.45);
    --vs-border: rgba(255, 255, 255, 0.16);
    --vs-accent: #00a1db;
    --vs-accent-dark: #0080b0;
    --vs-accent-darker: #005f85;
    --vs-accent-rgb: 0, 161, 219;
    --vs-menu-bg: rgba(20, 20, 22, 0.94);
    --vs-menu-divider: rgba(255, 255, 255, 0.06);
    --vs-menu-input-bg: rgba(255, 255, 255, 0.05);
    --vs-menu-input-border: rgba(255, 255, 255, 0.12);
    --vs-menu-button-bg: rgba(255, 255, 255, 0.06);
    --vs-menu-button-bg-hover: rgba(255, 255, 255, 0.10);
    --vs-menu-button-border: rgba(255, 255, 255, 0.10);
    --vs-menu-track-bg: rgba(255, 255, 255, 0.04);
    --vs-menu-shadow-1: 0 20px 60px -10px rgba(0, 0, 0, 0.7);
    --vs-menu-shadow-2: 0 8px 24px -6px rgba(0, 0, 0, 0.5);
    --vs-menu-active-bg: linear-gradient(135deg, var(--vs-accent-dark) 0%, var(--vs-accent-darker) 100%);
    --vs-menu-active-fg: #ffffff;
    --vs-menu-active-glow: 0 2px 10px rgba(var(--vs-accent-rgb), 0.35);
    --vs-toggle-on: var(--vs-accent-dark);
  }

  .vs-panel {
    display: flex;
    align-items: center;
    gap: 16px;
    margin: 12px auto;
    width: 100%;
    box-sizing: border-box;
    background: transparent;
    color: var(--vs-text-primary);
    position: static;
    font-family: inherit;
  }

  .speed-buttons-row {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    flex-wrap: nowrap;
    flex-shrink: 0;
  }
  .speed-button {
    position: relative;
    min-width: 56px;
    height: 28px;
    padding: 0 14px;
    border: 1px solid var(--vs-border);
    outline: none;
    border-radius: 14px;
    background: var(--vs-bg-button);
    color: var(--vs-button-text);
    cursor: pointer;
    font-family: inherit;
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.05px;
    font-variant-numeric: tabular-nums;
    display: inline-flex;
    align-items: center;
    justify-content: center;
  }
  .speed-button.active {
    background: linear-gradient(135deg, var(--vs-accent) 0%, var(--vs-accent-dark) 100%);
    color: #fff;
    font-weight: 600;
    border-color: transparent;
    box-shadow: 0 2px 10px rgba(var(--vs-accent-rgb), 0.35);
  }

  .speed-slider-container {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 0 4px;
    flex: 0 1 300px;
    min-width: 100px;
    max-width: 300px;
    height: 32px;
    position: relative;
  }
  .speed-slider {
    -webkit-appearance: none;
    appearance: none;
    width: 100%;
    height: 4px;
    border-radius: 999px;
    background: linear-gradient(
      to right,
      var(--vs-accent) 0%,
      var(--vs-accent) var(--vs-slider-fill),
      var(--vs-bg-track) var(--vs-slider-fill),
      var(--vs-bg-track) 100%
    );
  }
  .speed-slider::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 12px; height: 12px;
    border-radius: 50%;
    background: #fff;
    box-shadow: 0 1px 4px rgba(0, 0, 0, 0.5);
  }

  .vs-gear-wrapper {
    position: relative;
    display: inline-flex;
    flex-shrink: 0;
  }
  .vs-gear-button {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 28px;
    height: 28px;
    border: none;
    border-radius: 50%;
    background: var(--vs-bg-button);
    color: var(--vs-button-text);
    cursor: pointer;
  }

  /* Settings modal — full styling so the open-modal screenshot looks
     exactly like the real one. */
  .settings-menu {
    position: absolute;
    top: calc(100% + 6px);
    right: 0;
    background: var(--vs-menu-bg);
    -webkit-backdrop-filter: blur(24px) saturate(180%);
    backdrop-filter: blur(24px) saturate(180%);
    color: var(--vs-text-primary);
    border-radius: 14px;
    padding: 0;
    width: 340px;
    border: 1px solid var(--vs-border);
    box-shadow: var(--vs-menu-shadow-1), var(--vs-menu-shadow-2);
    font-family: 'Inter Tight', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    z-index: 1000;
  }
  .settings-menu.show { display: flex; flex-direction: column; }
  .vs-menu-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 16px 12px;
    border-bottom: 1px solid var(--vs-menu-divider);
  }
  .vs-menu-title {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: -0.01em;
  }
  .vs-menu-title-dot {
    width: 14px;
    height: 14px;
    border-radius: 4px;
    background: var(--vs-accent);
  }
  .vs-menu-version {
    font-size: 10px;
    font-weight: 500;
    color: var(--vs-text-dim);
    font-family: ui-monospace, 'SF Mono', Menlo, Consolas, monospace;
  }
  .vs-tabs {
    display: flex;
    gap: 4px;
    margin: 10px 12px 0;
    border-bottom: 1px solid var(--vs-menu-divider);
  }
  .vs-tab {
    padding: 6px 8px;
    background: transparent;
    border: none;
    color: inherit;
    cursor: pointer;
    opacity: 0.55;
    font-size: 12px;
    font-weight: 500;
  }
  .vs-tab.active {
    opacity: 1;
    border-bottom: 2px solid var(--vs-accent);
  }
  .vs-tab-panel {
    padding: 10px 16px 14px;
  }
  .vs-section { margin-bottom: 18px; }
  .vs-section-label {
    font-size: 10px;
    opacity: 0.7;
    margin-bottom: 6px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }
  .vs-segmented {
    display: flex;
    gap: 2px;
    background: var(--vs-menu-track-bg);
    border-radius: 9px;
    padding: 4px;
  }
  .vs-segmented-option {
    flex: 1;
    padding: 0 8px;
    height: 28px;
    background: transparent;
    border: none;
    color: var(--vs-text-secondary);
    cursor: pointer;
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    font-weight: 500;
  }
  .vs-segmented-option.active {
    background: var(--vs-menu-active-bg);
    color: var(--vs-menu-active-fg);
    box-shadow: var(--vs-menu-active-glow);
    font-weight: 600;
  }

  .vs-preset-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin: 8px 0;
  }
  .vs-preset-pill {
    flex: 0 0 auto;
    min-width: 52px;
    padding: 6px 10px;
    background: var(--vs-menu-button-bg);
    border: 1px solid transparent;
    border-radius: 999px;
    color: var(--vs-text-secondary);
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
  }
  .vs-preset-pill.active {
    background: var(--vs-menu-active-bg);
    color: var(--vs-menu-active-fg);
    font-weight: 600;
    box-shadow: var(--vs-menu-active-glow);
  }

  .vs-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 6px 0;
  }
  .vs-row-label { font-size: 13px; }
  .vs-toggle {
    position: relative;
    display: inline-block;
    width: 32px;
    height: 18px;
  }
  .vs-toggle-track {
    position: absolute;
    inset: 0;
    background: var(--vs-bg-track);
    border-radius: 10px;
  }
  .vs-toggle.on .vs-toggle-track { background: var(--vs-toggle-on); }
  .vs-toggle-thumb {
    position: absolute;
    top: 2px;
    left: 2px;
    width: 14px;
    height: 14px;
    background: #fff;
    border-radius: 50%;
  }
  .vs-toggle.on .vs-toggle-thumb { left: 16px; }
</style>
</head>
<body>
<div class="b-tophead">
  <div class="b-tophead-logo"><span class="hd">HD</span>REZKA</div>
  <div class="b-tophead-nav">
    <span>Фильмы</span><span>Сериалы</span><span>Мультфильмы</span><span>Аниме</span>
  </div>
</div>

<div class="b-content__main">
  <div class="b-player">
    <div class="player-play-btn"></div>
    <div class="plyr__controls">
      <div class="plyr__icon"></div>
      <div class="plyr__progress"></div>
      <span style="font-variant-numeric:tabular-nums">00:42:18 / 01:44:48</span>
    </div>
  </div>

  <!-- Speed panel (live UI from src/ui/styles.ts) -->
  <div class="vs-panel" data-vs-site="hdrezka" id="vs-panel">
    <div class="speed-buttons-row">
      <button class="speed-button">1x</button>
      <button class="speed-button">1.1x</button>
      <button class="speed-button">1.2x</button>
      <button class="speed-button">1.3x</button>
      <button class="speed-button active">1.4x</button>
      <button class="speed-button">1.5x</button>
      <button class="speed-button">1.6x</button>
      <button class="speed-button">1.7x</button>
      <button class="speed-button">1.8x</button>
      <button class="speed-button">1.9x</button>
      <button class="speed-button">2x</button>
    </div>
    <div class="speed-slider-container">
      <input type="range" min="0.5" max="4" step="0.05" value="1.4"
             class="speed-slider"
             style="--vs-slider-fill: 25.7%">
    </div>
    <div class="vs-gear-wrapper">
      <button class="vs-gear-button" aria-label="Settings">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3"></circle>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
        </svg>
      </button>
    </div>
  </div>
</div>

<!-- Settings modal — toggled by ?modal=1 query parameter for the second screenshot. -->
<div id="settings-modal" class="settings-menu" style="display:none; position:fixed; top:calc(56px + 24px + 56.25vw - 460px); right: calc(50vw - 540px); max-width: 340px;">
  <div class="vs-menu-header">
    <div class="vs-menu-title">
      <span class="vs-menu-title-dot"></span>
      Скорость воспроизведения
    </div>
    <span class="vs-menu-version">v0.2.0</span>
  </div>
  <div class="vs-tabs">
    <button class="vs-tab active">Общие</button>
    <button class="vs-tab">Клавиши</button>
    <button class="vs-tab">Диагностика</button>
    <button class="vs-tab">Поддержать</button>
  </div>
  <div class="vs-tab-panel">
    <div class="vs-section">
      <div class="vs-section-label">Положение ползунка</div>
      <div class="vs-segmented">
        <button class="vs-segmented-option active">Справа</button>
        <button class="vs-segmented-option">Снизу</button>
        <button class="vs-segmented-option">В плеере</button>
      </div>
    </div>
    <div class="vs-section">
      <div class="vs-section-label">Кнопки скорости</div>
      <div class="vs-preset-grid">
        <button class="vs-preset-pill">0.5x</button>
        <button class="vs-preset-pill">0.75x</button>
        <button class="vs-preset-pill active">1x</button>
        <button class="vs-preset-pill active">1.1x</button>
        <button class="vs-preset-pill active">1.2x</button>
        <button class="vs-preset-pill active">1.3x</button>
        <button class="vs-preset-pill active">1.4x</button>
        <button class="vs-preset-pill active">1.5x</button>
        <button class="vs-preset-pill active">1.6x</button>
        <button class="vs-preset-pill active">1.7x</button>
        <button class="vs-preset-pill active">1.8x</button>
        <button class="vs-preset-pill active">1.9x</button>
        <button class="vs-preset-pill active">2x</button>
        <button class="vs-preset-pill">2.5x</button>
        <button class="vs-preset-pill">3x</button>
        <button class="vs-preset-pill">4x</button>
      </div>
    </div>
    <div class="vs-section">
      <div class="vs-section-label">Поведение</div>
      <div class="vs-row">
        <span class="vs-row-label">Запоминать последнюю скорость</span>
        <span class="vs-toggle on"><span class="vs-toggle-track"></span><span class="vs-toggle-thumb"></span></span>
      </div>
    </div>
  </div>
</div>

<script>
  // Read ?modal=1 to render the open-modal variant in the same HTML file.
  const modal = document.getElementById('settings-modal');
  if (new URLSearchParams(location.search).has('modal')) {
    modal.style.display = 'flex';
    modal.classList.add('show');
  }
</script>
</body>
</html>
